name: "Test"

on:
  push: null
  workflow_dispatch: null

jobs:
  test:
    name: "test"
    strategy:
      matrix:
        runner:
          - "ubuntu-latest"
          - "windows-latest"
          - "macos-latest"

        cpythons:
          - ["3.14", "3.13"]

        tox-environments:
          - ["py3.14"]

    uses: "kurtmckee/github-workflows/.github/workflows/tox.yaml@updates"
    with:
      config: "${{ toJSON(matrix) }}"
